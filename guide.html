<style>
/* ===== メインタブ ===== */
.main-tabs {
  display: flex; gap: 4px; overflow-x: auto;
  padding: 0 0 4px; margin-bottom: 14px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.main-tabs::-webkit-scrollbar { display: none; }
.main-tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 16px; border-radius: var(--r12);
  border: 2px solid var(--gray100); background: var(--white);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .15s; color: var(--gray600); font-size: 12px; font-weight: 600;
}
.main-tab i { font-size: 22px; }
.main-tab.active { color: var(--white); border-color: transparent; }

/* ===== サブタブ ===== */
.sub-tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 14px;
  scrollbar-width: none;
}
.sub-tabs::-webkit-scrollbar { display: none; }
.sub-tab {
  padding: 7px 14px; border-radius: 99px;
  border: 2px solid var(--gray200); background: var(--white);
  color: var(--gray600); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .15s;
}
.sub-tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* ===== 検索 ===== */
.searchbox { position: relative; margin-bottom: 14px; }
.searchbox i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--gray400); }
#search { padding-left: 44px; }

/* ===== カード ===== */
.guide-card {
  background: var(--white); border-radius: var(--r16);
  box-shadow: var(--shadow-sm); padding: 16px 18px;
  margin-bottom: 10px; border-left: 4px solid transparent;
}
.guide-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.guide-head-left { display: flex; align-items: center; gap: 12px; }
.guide-icon { width: 40px; height: 40px; border-radius: var(--r12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.guide-icon i { font-size: 20px; }
.guide-title { font-size: 15px; font-weight: 700; color: var(--navy); margin: 0; line-height: 1.4; }
.guide-body { padding-left: 52px; }
.g-label { font-size: 11px; font-weight: 700; color: var(--gray400); margin: 0 0 4px; letter-spacing: .05em; text-transform: uppercase; }
.g-docs { font-size: 14px; margin: 0 0 10px; padding-left: 18px; }
.g-docs li { margin-bottom: 4px; }
.g-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 2px; }
.g-meta-item p { margin: 0; font-size: 14px; }
.g-note { font-size: 13px; color: var(--gray500); margin: 8px 0 0; display: flex; align-items: flex-start; gap: 5px; background: var(--gray50); border-radius: var(--r8); padding: 8px 10px; }
.g-note i { font-size: 14px; flex-shrink: 0; margin-top: 1px; color: var(--orange); }
.g-amount { font-size: 16px; font-weight: 800; color: var(--orange); background: var(--orange-lt); border-radius: var(--r8); padding: 6px 12px; display: inline-block; margin-bottom: 8px; }
.empty { text-align: center; padding: 40px 20px; color: var(--gray400); }
.empty i { font-size: 40px; display: block; margin-bottom: 8px; opacity: .4; }
</style>
</head>

// ===== カテゴリ定義 =====
const CATS = [
  { id:'kanyu', label:'組合加入',  icon:'ti-users',        color:'#1A7A4A', bg:'#E8F5EE',
    subs:[
      { id:'shin',    label:'新規加入' },
      { id:'kazoku',  label:'家族の異動' },
      { id:'henkou',  label:'住所・氏名変更' },
      { id:'taikai',  label:'脱退・喪失' },
    ]
  },
  { id:'kokuho', label:'土建国保',  icon:'ti-heart-plus',   color:'#4A1A9B', bg:'#EDE8FE',
    subs:[
      { id:'kyufu',    label:'給付を受ける' },
      { id:'kazoku2',  label:'家族の加入・脱退' },
      { id:'sashidashi', label:'証明書・再発行' },
    ]
  },
  { id:'kyosai', label:'総合共済',  icon:'ti-shield-heart', color:'#9B3A1A', bg:'#FEF0ED',
    subs:[
      { id:'kyosai-kyufu', label:'共済金の申請' },
      { id:'kyosai-iwai',  label:'祝金・支援金' },
    ]
  },
  { id:'rodo',   label:'労働保険',  icon:'ti-helmet',       color:'#0C447C', bg:'#E8F0FB',
    subs:[
      { id:'kanyu-rodo',   label:'加入する' },
      { id:'rousai-seikyu', label:'労災申請' },
      { id:'nenkan',       label:'年度更新' },
    ]
  },
];

let currentCat = 'kanyu';
let currentSub = 'shin';
let searchWord = '';

// ===== 描画 =====
function renderMainTabs(){
  document.getElementById('main-tabs').innerHTML = CATS.map(c=>`
    <button class="main-tab${currentCat===c.id?' active':''}"
      style="${currentCat===c.id?`background:${c.color};`:'color:var(--gray600);'}"
      onclick="selectCat('${c.id}')">
      <i class="ti ${c.icon}"></i>${c.label}
    </button>`).join('');
}

function renderSubTabs(){
  const cat = CATS.find(c=>c.id===currentCat);
  document.getElementById('sub-tabs').innerHTML = cat.subs.map(s=>`
    <button class="sub-tab${currentSub===s.id?' active':''}"
      onclick="selectSub('${s.id}')">${s.label}</button>`).join('');
}

function renderList(){
  const q = searchWord.toLowerCase();
  const cat = CATS.find(c=>c.id===currentCat);
  const filtered = ITEMS.filter(item=>{
    const catMatch = item.cat === currentCat && item.sub === currentSub;
    if(q){
      const text = (item.title + item.docs.join(' ') + (item.note||'')).toLowerCase();
      return text.includes(q);
    }
    return catMatch;
  });

  const list = document.getElementById('list');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><p>該当する項目が見つかりませんでした</p></div>`;
    return;
  }
  const color = cat.color;
  list.innerHTML = filtered.map(item=>`
    <div class="guide-card" style="border-left-color:${color};">
      <div class="guide-head">
        <div class="guide-head-left">
          <div class="guide-icon" style="background:${item.bg};"><i class="ti ${item.icon}" style="color:${item.fg};"></i></div>
          <p class="guide-title">${item.title}</p>
        </div>
      </div>
      <div class="guide-body">
        ${item.amount ? `<div class="g-amount">💰 ${item.amount}</div>` : ''}
        <p class="g-label">必要書類</p>
        <ul class="g-docs">${item.docs.map(d=>`<li>${d}</li>`).join('')}</ul>
        <div class="g-meta">
          <div class="guide-meta-item"><p class="g-label">提出先</p><p>${item.where}</p></div>
          <div class="guide-meta-item"><p class="g-label">期限・タイミング</p><p>${item.deadline}</p></div>
        </div>
        ${item.note ? `<div class="g-note"><i class="ti ti-info-circle"></i><span>${item.note}</span></div>` : ''}
      </div>
    </div>`).join('');
}

function selectCat(id){
  currentCat = id;
  const cat = CATS.find(c=>c.id===id);
  currentSub = cat.subs[0].id;
  searchWord = '';
  document.getElementById('search').value = '';
  renderMainTabs();
  renderSubTabs();
  renderList();
  document.getElementById('page-subtitle').textContent = cat.label;
}

function selectSub(id){
  currentSub = id;
  searchWord = '';
  document.getElementById('search').value = '';
  renderSubTabs();
  renderList();
}

document.getElementById('search').addEventListener('input', e=>{
  searchWord = e.target.value.trim();
  // 検索時はカテゴリを無視して全件検索
  const q = searchWord.toLowerCase();
  if(!q){ renderList(); return; }
  const filtered = ITEMS.filter(item=>{
    const text = (item.title + item.docs.join(' ') + (item.note||'')).toLowerCase();
    return text.includes(q);
  });
  const list = document.getElementById('list');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><p>「${searchWord}」に一致する項目がありませんでした</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(item=>{
    const cat = CATS.find(c=>c.id===item.cat);
    return `
    <div class="guide-card" style="border-left-color:${cat.color};">
      <div class="guide-head">
        <div class="guide-head-left">
          <div class="guide-icon" style="background:${item.bg};"><i class="ti ${item.icon}" style="color:${item.fg};"></i></div>
          <p class="guide-title">${item.title}</p>
        </div>
        <span style="font-size:11px;font-weight:700;background:${cat.bg};color:${cat.color};padding:3px 8px;border-radius:99px;white-space:nowrap;">${cat.label}</span>
      </div>
      <div class="guide-body">
        ${item.amount ? `<div class="g-amount">💰 ${item.amount}</div>` : ''}
        <p class="g-label">必要書類</p>
        <ul class="g-docs">${item.docs.map(d=>`<li>${d}</li>`).join('')}</ul>
        <div class="g-meta">
          <div class="guide-meta-item"><p class="g-label">提出先</p><p>${item.where}</p></div>
          <div class="guide-meta-item"><p class="g-label">期限・タイミング</p><p>${item.deadline}</p></div>
        </div>
        ${item.note ? `<div class="g-note"><i class="ti ti-info-circle"></i><span>${item.note}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
});

// 初期表示
renderMainTabs();
renderSubTabs();
renderList();
</script>
