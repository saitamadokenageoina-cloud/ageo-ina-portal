<style>
/* ===== メインタブ（上部4ボタン） ===== */
.mtab-wrap {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.mtab {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 5px !important;
  padding: 10px 4px !important;
  border-radius: 12px !important;
  border: 2px solid #ECEEF2 !important;
  background: #fff !important;
  cursor: pointer !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  color: #5A6070 !important;
  line-height: 1.3 !important;
  text-align: center !important;
  transition: all .15s !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.06) !important;
  width: 100% !important;
}
.mtab-glyph { font-size: 22px !important; display: block !important; line-height: 1 !important; }
.mtab.on { color: #fff !important; border-color: transparent !important; }
.mtab.on.c1 { background: #1A7A4A !important; }
.mtab.on.c2 { background: #4A1A9B !important; }
.mtab.on.c3 { background: #9B3A1A !important; }
.mtab.on.c4 { background: #0C447C !important; }

/* ===== サブタブ ===== */
.stab-wrap {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stab-wrap::-webkit-scrollbar { display: none; }
.stab {
  padding: 8px 16px !important;
  border-radius: 99px !important;
  border: 2px solid #D8DBE3 !important;
  background: #fff !important;
  color: #5A6070 !important;
  font-size: 13px !important;
  font-weight: 700 !important;
  cursor: pointer !important;
  white-space: nowrap !important;
  flex-shrink: 0 !important;
  transition: all .15s !important;
}
.stab.on { background: #1B2A3B !important; color: #fff !important; border-color: #1B2A3B !important; }

/* ===== 検索 ===== */
.sbox { position: relative; margin-bottom: 14px; }
.sbox i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #334155; pointer-events: none; }
.sbox input { width: 100%; padding: 13px 16px 13px 44px; border-radius: 12px; border: 2px solid #ECEEF2; background: #fff; color: #1B1E27; font-size: 16px; font-family: inherit; outline: none; }
.sbox input:focus { border-color: #E8612A; }

/* ===== ガイドカード ===== */
.gcard {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  padding: 16px 18px;
  margin-bottom: 10px;
  border-left: 4px solid #E8612A;
}
.gcard-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.gicon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gicon i { font-size: 20px; }
.gicon-glyph { font-size: 23px; line-height: 1; display: block; }
.gtitle { font-size: 15px; font-weight: 700; color: #1B2A3B; margin: 0; line-height: 1.4; padding-top: 2px; }
.gbody { padding-left: 54px; }
.glabel { font-size: 11px; font-weight: 800; color: #334155; margin: 0 0 4px; letter-spacing: .05em; }
.gdocs { font-size: 14px; margin: 0 0 10px; padding-left: 18px; color: #1B1E27; }
.gdocs li { margin-bottom: 4px; line-height: 1.5; }
.gmeta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 4px; }
.gmeta-item p { margin: 0; font-size: 14px; }
.gnote { font-size: 13px; color: #5A6070; margin: 8px 0 0; display: flex; align-items: flex-start; gap: 6px; background: #F5F6F8; border-radius: 8px; padding: 8px 10px; line-height: 1.6; }
.gnote i { font-size: 14px; flex-shrink: 0; margin-top: 2px; color: #E8612A; }
.gamount { font-size: 15px; font-weight: 800; color: #E8612A; background: #FFF0E9; border-radius: 8px; padding: 7px 12px; display: inline-block; margin-bottom: 10px; }
.empty { text-align: center; padding: 40px 20px; color: #334155; font-weight: 700; }
.empty i { font-size: 44px; display: block; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 15px; margin: 0; }
.panel { display: none; }
.panel.on { display: block; }
/* 検索件数バナー */
#search-result.on { display: block; margin-bottom: 10px; }
</style>

  'ti-shield-heart':'🛡️','ti-first-aid-kit':'🏥','ti-alert-triangle':'⚠️','ti-heart-broken':'🕯️',
  'ti-ribbon-health':'🎗️','ti-cake':'🎂','ti-school':'🎒','ti-certificate':'📜','ti-lungs':'🫁',
  'ti-lung':'🫁','ti-home-shield':'🏚️','ti-bed':'🛏️','ti-helmet':'⛑️','ti-shield-check':'✅',
  'ti-road':'🛣️','ti-calendar-stats':'📅','ti-briefcase':'💼','ti-file-certificate':'📄',
  'ti-replace':'🔁'
};
function guideGlyph(d){
  return GUIDE_GLYPHS[d.icon] || '📌';
}
function card(d, overrideColor, badge) {
  const borderColor = overrideColor || d.color || '#E8612A';
  return `<div class="gcard" style="border-left-color:${borderColor};">
    <div class="gcard-head">
      <div class="gicon" style="background:${d.bg}; color:${d.fg};"><span class="gicon-glyph" aria-hidden="true">${guideGlyph(d)}</span></div>
      <p class="gtitle">${d.title}${badge||''}</p>
    </div>
    <div class="gbody">
      ${d.amount ? `<div class="gamount">💰 ${d.amount}</div>` : ''}
      <p class="glabel">必要書類</p>
      <ul class="gdocs">${d.docs.map(x=>`<li>${x}</li>`).join('')}</ul>
      <div class="gmeta">
        <div class="gmeta-item"><p class="glabel">提出先</p><p>${d.where}</p></div>
        <div class="gmeta-item"><p class="glabel">期限</p><p>${d.deadline}</p></div>
      </div>
      ${d.note ? `<div class="gnote"><i class="ti ti-info-circle"></i><span>${d.note}</span></div>` : ''}
    </div>
  </div>`;
}

// ===== タブ切替 =====
let curM = 1;
function mTab(n) {
  // メインタブ
  for(let i=1;i<=4;i++){
    const el = document.getElementById('mt'+i);
    el.classList.remove('on','c1','c2','c3','c4');
    if(i===n){ el.classList.add('on','c'+n); }
    document.getElementById('p'+i).classList.toggle('on', i===n);
  }
  // そのパネルの最初のサブタブを選択
  const firstSub = document.querySelector('#p'+n+' .stab');
  if(firstSub) {
    document.querySelectorAll('#p'+n+' .stab').forEach(b=>b.classList.remove('on'));
    firstSub.classList.add('on');
    // 最初のサブパネルを表示
    document.querySelectorAll('#p'+n+' [id^="p'+n+'-"]').forEach((el,i)=>el.classList.toggle('on',i===0));
  }
  curM = n;
  document.getElementById('search').value = '';
  document.getElementById('search-result').classList.remove('on');
}

function sTab(m, n) {
  document.querySelectorAll('#p'+m+' .stab').forEach(b=>b.classList.remove('on'));
  document.getElementById('s'+m+'-'+n).classList.add('on');
  document.querySelectorAll('#p'+m+' [id^="p'+m+'-"]').forEach(el=>el.classList.remove('on'));
  document.getElementById('p'+m+'-'+n).classList.add('on');
}

// ===== 検索 =====
// タブは常時表示。検索ワードに合わないカードだけ非表示にする。
function doSearch(q) {
  const lq = q.trim().toLowerCase();
  const allCards = document.querySelectorAll('.gcard');
  const sr = document.getElementById('search-result');

  if(!lq){
    // 検索ワードなし → 全カード表示に戻す
    allCards.forEach(c => c.style.display = '');
    // 各サブパネルの「該当なし」メッセージを消す
    document.querySelectorAll('.no-match-msg').forEach(e => e.remove());
    sr.classList.remove('on');
    sr.innerHTML = '';
    return;
  }

  // カードごとにテキストマッチを確認
  let totalHit = 0;
  allCards.forEach(c => {
    const text = c.textContent.toLowerCase();
    const hit = text.includes(lq);
    c.style.display = hit ? '' : 'none';
    if(hit) totalHit++;
  });

  // 各サブパネルに「該当なし」メッセージを出す
  document.querySelectorAll('.no-match-msg').forEach(e => e.remove());
  document.querySelectorAll('[id^="p"][id$="-1"],[id^="p"][id$="-2"],[id^="p"][id$="-3"],[id^="p"][id$="-4"]').forEach(panel => {
    const visible = [...panel.querySelectorAll('.gcard')].some(c => c.style.display !== 'none');
    if(!visible && panel.querySelector('.gcard')){
      const msg = document.createElement('p');
      msg.className = 'no-match-msg';
      msg.style.cssText = 'text-align:center;padding:20px;color:#334155;font-size:13px;font-weight:700;';
      msg.textContent = '「' + q + '」に一致する項目はありません';
      panel.appendChild(msg);
    }
  });

  // 検索件数バナー
  sr.innerHTML = totalHit > 0
    ? `<div style="font-size:13px;font-weight:600;color:#E8612A;background:#FFF0E9;border-radius:8px;padding:8px 14px;margin-bottom:4px;"><i class="ti ti-search" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>全カテゴリで <strong>${totalHit}件</strong> 見つかりました</div>`
    : `<div style="font-size:13px;font-weight:800;color:#334155;background:#F5F6F8;border-radius:8px;padding:8px 14px;margin-bottom:4px;"><i class="ti ti-search-off" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>「${q}」に一致する項目がありませんでした</div>`;
  sr.classList.add('on');
}

// ===== 初期レンダリング =====
for(const [key, items] of Object.entries(DATA)){
  const el = document.getElementById('p' + key.replace('-','-'));
  if(el) el.innerHTML = items.map(d=>card(d)).join('');
}
