<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>加入のメリット｜埼玉土建上尾伊奈支部</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-tertiary: #ebe9e2;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --c-teal-50: #E1F5EE; --c-teal-800: #085041;
    --c-coral-50: #FAECE7; --c-coral-800: #712B13;
    --c-green-50: #EAF3DE; --c-green-800: #27500A;
    --c-amber-50: #FAEEDA; --c-amber-800: #633806;
    --c-blue-50: #E6F1FB; --c-blue-800: #0C447C;
    --c-purple-50: #EEEDFE; --c-purple-800: #3C3489;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #232320;
      --color-background-secondary: #2c2c2a;
      --color-background-tertiary: #1a1a18;
      --color-text-primary: #f1efe8;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --c-teal-50: #085041; --c-teal-800: #9FE1CB;
      --c-coral-50: #712B13; --c-coral-800: #F5C4B3;
      --c-green-50: #27500A; --c-green-800: #C0DD97;
      --c-amber-50: #633806; --c-amber-800: #FAC775;
      --c-blue-50: #0C447C; --c-blue-800: #B5D4F4;
      --c-purple-50: #3C3489; --c-purple-800: #CECBF6;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    line-height: 1.7;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
  header { padding: 0.5rem 0 1.5rem; }
  header p.eyebrow { font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 4px; }
  header h1 { font-size: 22px; font-weight: 500; margin: 0 0 8px; }
  header p.lead { font-size: 14px; color: var(--color-text-secondary); margin: 0; }
  .cat-section { margin-bottom: 1.75rem; }
  .cat-title {
    font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
    margin: 0 0 10px; padding-bottom: 6px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.1rem;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .icon-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .icon-circle i { font-size: 18px; }
  .card-title { font-size: 14px; font-weight: 500; margin: 0 0 4px; }
  .card-desc { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
  .links-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; font-size: 13px; margin-top: 1rem; }
  .links-box p.title { font-weight: 500; margin: 0 0 8px; }
  .links-box a { color: var(--color-text-info); display: block; margin-bottom: 6px; text-decoration: none; }
  .links-box a:hover { text-decoration: underline; }
  footer { margin-top: 2rem; font-size: 11px; color: var(--color-text-tertiary); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">埼玉土建一般労働組合 上尾伊奈支部</p>
    <h1>加入のメリット</h1>
    <p class="lead">建設業で働くあなたとご家族の仕事とくらしを、組合費の中ですべて支えます。</p>
  </header>

  <div id="merit-content"></div>

  <div class="links-box">
    <p class="title"><i class="ti ti-link" aria-hidden="true"></i> 関連リンク</p>
    <a href="https://www.saitama-doken.or.jp/support/" target="_blank" rel="noopener">加入のメリット一覧（公式）</a>
    <a href="https://www.saitama-doken.or.jp/join/" target="_blank" rel="noopener">加入方法（公式）</a>
    <a href="https://www.saitama-doken.or.jp/" target="_blank" rel="noopener">埼玉土建一般労働組合 公式サイト</a>
    <a href="https://www.sai-doken-kokuho.jp" target="_blank" rel="noopener">埼玉土建国民健康保険組合</a>
  </div>

  <footer>詳細・最新情報は支部事務所、または公式サイトでご確認ください。</footer>
</div>

<script>
const MERITS = [
  { cat:"共済・保障", icon:"ti-shield-heart", bg:"var(--c-coral-50)", fg:"var(--c-coral-800)", title:"総合共済", desc:"月1,390円（組合費に含まれる）で大型保障。病気・ケガによる休業補償、万が一の死亡保障に加え、結婚・出生・就学などの祝金、資格取得祝金まで幅広くカバーします。" },
  { cat:"共済・保障", icon:"ti-heart-plus", bg:"var(--c-coral-50)", fg:"var(--c-coral-800)", title:"埼玉土建国保", desc:"入院医療費の全額払戻しなど、組合員・家族ともに手厚い給付制度。傷病手当金は病気・ケガそれぞれ最大180日分を支給します。" },
  { cat:"共済・保障", icon:"ti-lungs", bg:"var(--c-coral-50)", fg:"var(--c-coral-800)", title:"じん肺・アスベスト対策", desc:"建設従事者に多い職業病に対し、組織をあげて被害者救済・労災認定の支援に取り組んでいます。" },
  { cat:"共済・保障", icon:"ti-piggy-bank", bg:"var(--c-coral-50)", fg:"var(--c-coral-800)", title:"建設業退職金共済（建退共）", desc:"公共工事を請け負った元請が現場で証紙を貼り、退職時に枚数に応じて退職金が支払われる、国の退職金制度です。" },
  { cat:"労働環境", icon:"ti-shield-check", bg:"var(--c-green-50)", fg:"var(--c-green-800)", title:"労働保険（労災・雇用保険）", desc:"埼玉土建の各支部は厚生労働大臣認可の労働保険事務組合。加入手続きを支部で完結できます。" },
  { cat:"労働環境", icon:"ti-id", bg:"var(--c-green-50)", fg:"var(--c-green-800)", title:"CCUS（建設キャリアアップシステム）", desc:"各支部が認定登録機関のため、登録手続き・相談を支部で対応できます。" },
  { cat:"労働環境", icon:"ti-briefcase", bg:"var(--c-green-50)", fg:"var(--c-green-800)", title:"労働者供給事業", desc:"国の認可を受けた事業を通じて、建設現場で安心して働ける環境づくりを支援しています。" },
  { cat:"仕事支援", icon:"ti-home-check", bg:"var(--c-amber-50)", fg:"var(--c-amber-800)", title:"住推協（住宅リフォーム推進サポート協議会）", desc:"消費者が安心して選べる事業者として、国の登録制度に対応した団体に加入できます。" },
  { cat:"仕事支援", icon:"ti-certificate", bg:"var(--c-amber-50)", fg:"var(--c-amber-800)", title:"資格取得支援", desc:"埼玉土建技術研修センターで技能検定の支援や各種作業主任者講習を実施。資格取得祝金も充実しています。" },
  { cat:"仕事支援", icon:"ti-building-bank", bg:"var(--c-amber-50)", fg:"var(--c-amber-800)", title:"建築支援センター", desc:"NPO法人埼玉土建建築支援センターが、国土交通大臣指定の法定建築士講習を実施しています。" },
  { cat:"補償・保険", icon:"ti-shield", bg:"var(--c-blue-50)", fg:"var(--c-blue-800)", title:"総合賠償責任補償", desc:"工事中・作業中から引渡後の事故まで補償。業務災害・通勤災害については政府労災への上乗せ補償もあります。" },
  { cat:"補償・保険", icon:"ti-car", bg:"var(--c-blue-50)", fg:"var(--c-blue-800)", title:"自動車共済", desc:"団体割引で民間損保よりお得。走行距離や使用目的による掛金の割増がなく、全車種にロードサービスが付帯します。" },
  { cat:"補償・保険", icon:"ti-bike", bg:"var(--c-blue-50)", fg:"var(--c-blue-800)", title:"サイクるん（自転車保険）", desc:"年間4,250円（家族型）で、相手への賠償（3億円）とご自身のケガを補償。国内最大級の安さと補償を実現しています。" },
  { cat:"補償・保険", icon:"ti-flame", bg:"var(--c-blue-50)", fg:"var(--c-blue-800)", title:"どけん火災共済・地震共済", desc:"月500円程度の掛金で、もしものときに最大1,000万円規模の保障。火災共済への加入で地震共済にも加入できます。" },
  { cat:"生活サポート", icon:"ti-credit-card", bg:"var(--c-purple-50)", fg:"var(--c-purple-800)", title:"DOKENカード", desc:"埼玉県内700店以上の登録店と全国の提携施設で、組合員ならではの優待が受けられます。" },
  { cat:"生活サポート", icon:"ti-bed", bg:"var(--c-purple-50)", fg:"var(--c-purple-800)", title:"宿帳（指定宿泊施設利用補助）", desc:"関東周辺の提携宿泊施設で、1人3,000円まで補助。家族旅行を応援する制度です。" },
  { cat:"生活サポート", icon:"ti-scale", bg:"var(--c-purple-50)", fg:"var(--c-purple-800)", title:"各種相談（弁護士・税理士等）", desc:"弁護士・税理士・社労士・行政書士・司法書士の5つの士業ネットワークを通じ、無料相談に対応しています。" },
  { cat:"仲間づくり", icon:"ti-users", bg:"var(--c-teal-50)", fg:"var(--c-teal-800)", title:"班会議・青年部・主婦の会・シニア友の会", desc:"地域の仲間とつながり、現場の悩みや暮らしのことを共有できる場。組合費のコンビニ・スマホ払いへの移行も進めています。" }
];

function render(){
  const el = document.getElementById('merit-content');
  el.innerHTML = '';
  const cats = [...new Set(MERITS.map(m => m.cat))];
  cats.forEach(cat=>{
    const section = document.createElement('div');
    section.className = 'cat-section';

    const title = document.createElement('p');
    title.className = 'cat-title';
    title.textContent = cat;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    MERITS.filter(m => m.cat === cat).forEach(m=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="icon-circle" style="background:${m.bg}; color:${m.fg};">
          <i class="ti ${m.icon}" aria-hidden="true"></i>
        </div>
        <div>
          <p class="card-title">${m.title}</p>
          <p class="card-desc">${m.desc}</p>
        </div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    el.appendChild(section);
  });
}

render();
</script>
<script src="assets/js/navigation.js"></script>
</body>
</html>
