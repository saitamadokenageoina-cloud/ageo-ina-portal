<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>支部カレンダー｜埼玉土建 上尾伊奈支部</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
.cal-header{
  background:linear-gradient(135deg,var(--navy-dk),#1A3A6B);
  border-radius:var(--r16);padding:18px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:14px;
}
.cal-header i{font-size:44px;color:var(--orange);}
.cal-header h2{font-size:19px;font-weight:800;color:#fff;margin:0 0 3px;}
.cal-header p{font-size:13px;color:rgba(255,255,255,.6);margin:0;}

.cal-wrap{
  background:var(--white);border-radius:var(--r16);
  box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:12px;
}
.cal-wrap iframe{
  width:100%;border:none;display:block;
  min-height:600px;
}

.view-btns{display:flex;gap:8px;margin-bottom:12px;}
.view-btn{
  flex:1;padding:10px;border-radius:var(--r12);
  border:2px solid var(--gray200);background:var(--white);
  color:var(--gray700);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.view-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.view-btn:hover:not(.active){border-color:var(--orange);color:var(--orange);}
.view-btn i{font-size:16px;}


</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <button class="hdr-back" onclick="goBack()">
    <i class="ti ti-arrow-left"></i>戻る
  </button>
  <div style="text-align:right;">
    <p class="hdr-org" style="margin:0;">埼玉土建 上尾伊奈支部</p>
    <p class="hdr-title" style="margin:0;font-size:14px;">支部カレンダー</p>
  </div>
</header>

<div class="content">

  <div class="cal-header">
    <svg viewBox="0 0 70 70" width="56" height="56" style="flex-shrink:0;">
      <rect x="6" y="14" width="58" height="52" rx="7" fill="rgba(255,255,255,.18)"/>
      <rect x="9" y="22" width="52" height="41" rx="4" fill="rgba(255,255,255,.12)"/>
      <rect x="9" y="22" width="52" height="16" rx="4" fill="rgba(255,255,255,.35)"/>
      <rect x="18" y="6" width="7" height="16" rx="3.5" fill="rgba(255,255,255,.7)"/>
      <rect x="45" y="6" width="7" height="16" rx="3.5" fill="rgba(255,255,255,.7)"/>
      <text x="35" y="33" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.8)" font-weight="bold">6月</text>
      <circle cx="18" cy="50" r="4" fill="rgba(255,255,255,.4)"/>
      <circle cx="32" cy="50" r="4" fill="rgba(255,200,0,.8)"/>
      <circle cx="46" cy="50" r="4" fill="rgba(255,255,255,.35)"/>
      <circle cx="18" cy="60" r="4" fill="rgba(255,255,255,.35)"/>
      <circle cx="32" cy="60" r="4" fill="rgba(100,220,130,.7)"/>
    </svg>
    <div>
      <h2>支部カレンダー</h2>
      <p>班会議・行事・講習など支部の予定を確認できます</p>
    </div>
  </div>

  <!-- 表示切替 -->
  <div class="view-btns" id="view-btns">
    <button class="view-btn active" onclick="switchView('month',this)">
      <i class="ti ti-calendar-month"></i>月表示
    </button>
    <button class="view-btn" onclick="switchView('week',this)">
      <i class="ti ti-calendar-week"></i>週表示
    </button>
    <button class="view-btn" onclick="switchView('agenda',this)">
      <i class="ti ti-list"></i>一覧表示
    </button>
  </div>

  <!-- Googleカレンダー埋め込み -->
  <div class="cal-wrap">
    <iframe
      id="gcal"
      src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=Asia%2FTokyo&showPrint=0&src=c2FpdGFtYWRva2VuYWdlb2luYUBnbWFpbC5jb20&src=OTIwZGY5NzEyMmJjNjJjYjg0ODUyNDI4ZjAxOTI4NTAwZDQzMGIwMGE1YWNlZjQ0OGQ2ZWI2NzlkOGNkZjFmYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=NTQxNjFiNDgzY2ZhYTEzZjA1NjQ4MjRmNGZhZWZiMjlkZTE0MGRiOWVkYWYxMTM1NGE3ZTdhYjFlYTg0YTliYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZTAxOGRmZTE0Njc1MGI3YzkxNTI2NzAzYTBiZDg3OTQ2NDAzYzU0YTcyZjRjY2FlOWQ1ZDNhZDdmNGJhYTA4OUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YjA3N2RjOGQzYzRhMzI5MjZhMTdjYTdhYjU1ZmIwZDdmM2ExY2JkYTMwMDAxMmVhNmE0MDg2MWQyNmU3MjI4ZEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZmVkNzhiZWJhZmFkYjNjNDZkMmEwMjNhMDI1NDllNWNkYWRmMzJhZDU2ZTU0NDRmNDBhNWFjOTljM2I2OGJkOEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=amEuamFwYW5lc2Uub2ZmaWNpYWwjaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23616161&color=%230b8043&color=%23d81b60&color=%23f4511e&color=%23f09300&color=%238e24aa&color=%234285f4"
      style="border:solid 1px #777; width:100%; height:600px; display:block;"
      width="800"
      height="600"
      frameborder="0"
      scrolling="no"
      title="埼玉土建 上尾伊奈支部 カレンダー">
    </iframe>
  </div>

</div>

<footer>埼玉土建一般労働組合 上尾伊奈支部｜TEL 048-773-9863</footer>
</div>

<script>

const BASE = 'https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=Asia%2FTokyo&showPrint=0&src=c2FpdGFtYWRva2VuYWdlb2luYUBnbWFpbC5jb20&src=OTIwZGY5NzEyMmJjNjJjYjg0ODUyNDI4ZjAxOTI4NTAwZDQzMGIwMGE1YWNlZjQ0OGQ2ZWI2NzlkOGNkZjFmYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=NTQxNjFiNDgzY2ZhYTEzZjA1NjQ4MjRmNGZhZWZiMjlkZTE0MGRiOWVkYWYxMTM1NGE3ZTdhYjFlYTg0YTliYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZTAxOGRmZTE0Njc1MGI3YzkxNTI2NzAzYTBiZDg3OTQ2NDAzYzU0YTcyZjRjY2FlOWQ1ZDNhZDdmNGJhYTA4OUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YjA3N2RjOGQzYzRhMzI5MjZhMTdjYTdhYjU1ZmIwZDdmM2ExY2JkYTMwMDAxMmVhNmE0MDg2MWQyNmU3MjI4ZEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZmVkNzhiZWJhZmFkYjNjNDZkMmEwMjNhMDI1NDllNWNkYWRmMzJhZDU2ZTU0NDRmNDBhNWFjOTljM2I2OGJkOEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=amEuamFwYW5lc2Uub2ZmaWNpYWwjaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23616161&color=%230b8043&color=%23d81b60&color=%23f4511e&color=%23f09300&color=%238e24aa&color=%234285f4&mode=';

function switchView(view, btn){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
