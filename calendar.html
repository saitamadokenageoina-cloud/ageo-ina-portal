<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
<meta name="theme-color" content="#071426">
<title>支部カレンダー｜埼玉土建 上尾伊奈支部</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
body{
  background:#071426;
}
.calendar-page{
  max-width:760px;
  background:
    radial-gradient(circle at 88px 140px,rgba(232,97,42,.16),transparent 150px),
    radial-gradient(circle at 92% 220px,rgba(38,127,213,.22),transparent 210px),
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),
    #071426;
  background-size:auto,auto,42px 42px,42px 42px,auto;
}
.calendar-page .content{
  padding:18px 16px 96px;
}
.calendar-hero{
  display:grid;
  grid-template-columns:86px 1fr;
  gap:16px;
  align-items:center;
  padding:22px 20px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  background:linear-gradient(135deg,rgba(30,65,118,.94),rgba(18,36,68,.94));
  box-shadow:0 18px 40px rgba(0,0,0,.22);
  overflow:hidden;
  position:relative;
}
.calendar-hero::after{
  content:"";
  position:absolute;
  right:-42px;
  top:-62px;
  width:190px;
  height:190px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
}
.calendar-icon{
  width:78px;
  height:78px;
  border-radius:22px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#F4772E,#C63428);
  color:#fff;
  box-shadow:0 14px 26px rgba(232,97,42,.32);
  position:relative;
  z-index:1;
}
.calendar-icon i{font-size:40px;}
.calendar-hero h1{
  margin:0 0 5px;
  color:#fff;
  font-size:26px;
  line-height:1.25;
  font-weight:900;
}
.calendar-hero p{
  margin:0;
  color:#C7D3E4;
  font-size:14px;
  font-weight:700;
  line-height:1.65;
}
.today-card{
  display:grid;
  grid-template-columns:82px 1fr;
  align-items:center;
  gap:14px;
  padding:16px 18px;
  margin-bottom:14px;
  border:1px solid rgba(117,204,235,.28);
  border-radius:18px;
  background:rgba(22,48,91,.82);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}
.date-block{
  text-align:center;
  color:#fff;
  line-height:1;
}
.date-block strong{
  display:block;
  font-size:42px;
  font-weight:950;
}
.date-block span{
  display:block;
  color:#75D6F6;
  font-size:15px;
  font-weight:900;
  margin-top:6px;
}
.today-text b{
  display:flex;
  align-items:center;
  gap:7px;
  color:#9BE7FF;
  font-size:17px;
  margin-bottom:6px;
}
.today-text p{
  margin:0;
  color:#DCE7F5;
  font-size:15px;
  font-weight:700;
}
.view-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  margin-bottom:14px;
  border:1px solid rgba(232,97,42,.65);
  border-radius:15px;
  overflow:hidden;
  background:rgba(22,48,91,.72);
}
.view-btn{
  border:0;
  min-height:56px;
  color:#C6D4E8;
  background:transparent;
  font-size:15px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}
.view-btn + .view-btn{border-left:1px solid rgba(232,97,42,.45);}
.view-btn.active{
  background:linear-gradient(135deg,#0871DB,#005BC5);
  color:#fff;
}
.view-btn i{font-size:18px;}
.legend{
  display:flex;
  gap:9px;
  overflow-x:auto;
  padding:12px 14px;
  margin-bottom:14px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  background:rgba(22,48,91,.72);
  scrollbar-width:none;
}
.legend::-webkit-scrollbar{display:none;}
.legend span{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:6px;
  color:#C9D6E9;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}
.dot{
  width:14px;
  height:14px;
  border-radius:4px;
  display:inline-block;
  background:#64748B;
  box-shadow:0 0 0 1px rgba(255,255,255,.18) inset;
}
.dot.meeting{background:#616161;}
.dot.branch{background:#0B8043;}
.dot.training{background:#D81B60;}
.dot.deadline{background:#F4511E;}
.dot.consult{background:#F09300;}
.dot.event{background:#8E24AA;}
.dot.holiday{background:#4285F4;}
.calendar-shell{
  margin-bottom:18px;
  overflow:hidden;
  border-radius:24px;
  border:2px solid rgba(232,97,42,.32);
  background:#F8FAFC;
  box-shadow:0 20px 48px rgba(0,0,0,.32);
}
.calendar-frame{
  width:100%;
  height:650px;
  border:0;
  display:block;
  background:#fff;
}
.section-label{
  display:flex;
  align-items:center;
  gap:10px;
  color:#9BE7FF;
  font-size:20px;
  font-weight:900;
  margin:6px 0 12px;
}
.agenda-shell{
  display:none;
  overflow:hidden;
  border-radius:18px;
  border:1px solid rgba(232,97,42,.38);
  background:#112B55;
}
.agenda-shell.active{display:block;}
.agenda-frame{
  width:100%;
  height:620px;
  border:0;
  display:block;
  background:#fff;
}
.tips{
  margin-top:14px;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:#D8E4F2;
  font-size:13px;
  font-weight:700;
  line-height:1.7;
}
.tips i{color:#FFB15C;margin-right:4px;}
html[data-theme="light"] .calendar-page{
  background:#F4F7FB;
}
html[data-theme="light"] .today-card,
html[data-theme="light"] .legend,
html[data-theme="light"] .view-tabs{
  background:#FFFFFF;
  border-color:#D8DBE3;
}
html[data-theme="light"] .date-block strong{color:#1B2A3B;}
html[data-theme="light"] .today-text p,
html[data-theme="light"] .legend span{color:#334155;}
html[data-theme="light"] .view-btn{color:#334155;}
html[data-theme="light"] .tips{
  background:#FFFFFF;
  color:#334155;
  border-color:#D8DBE3;
}
@media (max-width:520px){
  .calendar-page .content{padding:16px 12px 92px;}
  .calendar-hero{grid-template-columns:70px 1fr;padding:18px 16px;border-radius:22px;}
  .calendar-icon{width:64px;height:64px;border-radius:18px;}
  .calendar-icon i{font-size:34px;}
  .calendar-hero h1{font-size:22px;}
  .calendar-hero p{font-size:13px;}
  .today-card{grid-template-columns:66px 1fr;padding:14px;}
  .date-block strong{font-size:36px;}
  .view-btn{font-size:14px;min-height:52px;}
  .calendar-frame{height:620px;}
  .agenda-frame{height:560px;}
}
</style>
</head>
<body>
<div class="app calendar-page">
<header class="hdr">
  <button class="hdr-back" onclick="goBack()">
    <i class="ti ti-arrow-left"></i>戻る
  </button>
  <div style="text-align:right;">
    <p class="hdr-org" style="margin:0;">埼玉土建 上尾伊奈支部</p>
    <p class="hdr-title" style="margin:0;font-size:14px;">支部カレンダー</p>
  </div>
</header>

<div class="content">
  <section class="calendar-hero">
    <div class="calendar-icon"><i class="ti ti-calendar-event"></i></div>
    <div>
      <h1>支部カレンダー</h1>
      <p>会議・講習・行事・相談日を確認できます。Googleカレンダー側で更新すると自動反映されます。</p>
    </div>
  </section>

  <section class="today-card">
    <div class="date-block">
      <strong id="today-day">--</strong>
      <span id="today-week">--</span>
    </div>
    <div class="today-text">
      <b><i class="ti ti-calendar"></i>今日の日付</b>
      <p>Googleカレンダーで最新の予定を確認してください</p>
    </div>
  </section>

  <nav class="view-tabs" aria-label="表示切替">
    <button class="view-btn active" type="button" onclick="switchView('MONTH',this)"><i class="ti ti-calendar-month"></i>月表示</button>
    <button class="view-btn" type="button" onclick="switchView('WEEK',this)"><i class="ti ti-calendar-week"></i>週表示</button>
    <button class="view-btn" type="button" onclick="switchView('AGENDA',this)"><i class="ti ti-clipboard-list"></i>リスト</button>
  </nav>

  <div class="legend" aria-label="カレンダー分類">
    <span><i class="dot meeting"></i>全体</span>
    <span><i class="dot branch"></i>支部</span>
    <span><i class="dot training"></i>講習</span>
    <span><i class="dot deadline"></i>締切</span>
    <span><i class="dot consult"></i>相談</span>
    <span><i class="dot event"></i>行事</span>
    <span><i class="dot holiday"></i>祝日</span>
  </div>

  <section class="calendar-shell" id="calendar-shell">
    <iframe
      id="gcal"
      class="calendar-frame"
      title="埼玉土建 上尾伊奈支部 カレンダー"
      frameborder="0"
      scrolling="no">
    </iframe>
  </section>

  <div class="section-label"><i class="ti ti-clipboard-list"></i>今後の予定</div>
  <section class="agenda-shell active" id="agenda-shell">
    <iframe
      id="agenda"
      class="agenda-frame"
      title="埼玉土建 上尾伊奈支部 今後の予定"
      frameborder="0"
      scrolling="no">
    </iframe>
  </section>

  <div class="tips">
    <i class="ti ti-info-circle"></i>
    カレンダーが表示されない場合は、通信状況を確認してページを再読み込みしてください。予定の詳細は各予定をタップすると確認できます。
  </div>
</div>

<footer>埼玉土建一般労働組合 上尾伊奈支部｜TEL 048-773-9863</footer>
</div>

<script>
const CALENDAR_QUERY = 'height=600&wkst=1&ctz=Asia%2FTokyo&showPrint=0&showTabs=0&showCalendars=0&showTz=0&src=c2FpdGFtYWRva2VuYWdlb2luYUBnbWFpbC5jb20&src=OTIwZGY5NzEyMmJjNjJjYjg0ODUyNDI4ZjAxOTI4NTAwZDQzMGIwMGE1YWNlZjQ0OGQ2ZWI2NzlkOGNkZjFmYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=NTQxNjFiNDgzY2ZhYTEzZjA1NjQ4MjRmNGZhZWZiMjlkZTE0MGRiOWVkYWYxMTM1NGE3ZTdhYjFlYTg0YTliYkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZTAxOGRmZTE0Njc1MGI3YzkxNTI2NzAzYTBiZDg3OTQ2NDAzYzU0YTcyZjRjY2FlOWQ1ZDNhZDdmNGJhYTA4OUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YjA3N2RjOGQzYzRhMzI5MjZhMTdjYTdhYjU1ZmIwZDdmM2ExY2JkYTMwMDAxMmVhNmE0MDg2MWQyNmU3MjI4ZEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZmVkNzhiZWJhZmFkYjNjNDZkMmEwMjNhMDI1NDllNWNkYWRmMzJhZDU2ZTU0NDRmNDBhNWFjOTljM2I2OGJkOEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=amEuamFwYW5lc2Uub2ZmaWNpYWwjaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23616161&color=%230b8043&color=%23d81b60&color=%23f4511e&color=%23f09300&color=%238e24aa&color=%234285f4';
const CALENDAR_BASE = 'https://calendar.google.com/calendar/embed?' + CALENDAR_QUERY + '&mode=';

function setToday(){
  const now = new Date();
  const weeks = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
  document.getElementById('today-day').textContent = String(now.getDate());
  document.getElementById('today-week').textContent = weeks[now.getDay()];
}

function switchView(mode, btn){
  document.querySelectorAll('.view-btn').forEach(item => item.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gcal').src = CALENDAR_BASE + mode;
  document.getElementById('calendar-shell').style.display = mode === 'AGENDA' ? 'none' : '';
  document.getElementById('agenda-shell').classList.add('active');
  document.getElementById('agenda').src = CALENDAR_BASE + 'AGENDA';
}

setToday();
document.getElementById('gcal').src = CALENDAR_BASE + 'MONTH';
document.getElementById('agenda').src = CALENDAR_BASE + 'AGENDA';
</script>
<script src="assets/js/navigation.js"></script>
</body>
</html>
