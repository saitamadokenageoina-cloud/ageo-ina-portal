<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>36協定 正式様式プレビュー</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
body{background:#0f1720;color:#fff;margin:0;}
.preview-shell{min-height:100vh;display:flex;flex-direction:column;}
.preview-bar{
  position:sticky;top:0;z-index:20;background:#1B2A3B;border-bottom:1px solid rgba(255,255,255,.12);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.preview-title{min-width:0;}
.preview-title strong{display:block;font-size:15px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.preview-title span{display:block;font-size:11px;color:rgba(255,255,255,.58);}
.preview-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.preview-actions button,.preview-actions a{
  border:none;border-radius:8px;background:rgba(255,255,255,.1);color:#fff;
  min-height:38px;padding:0 12px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:13px;font-weight:800;
}
.preview-actions .print-btn{background:#E8612A;}
.preview-body{padding:18px;overflow:auto;}
.pdf-page{
  width:min(100%,1123px);aspect-ratio:841.92/595.32;margin:0 auto 18px;position:relative;background:#fff;
  box-shadow:0 18px 50px rgba(0,0,0,.42);overflow:hidden;
}
.pdf-page canvas{width:100%;height:100%;display:block;}
.fill{
  position:absolute;color:#111;font-weight:700;line-height:1.2;white-space:pre-wrap;overflow:hidden;
  font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;font-size:12px;
}
.fill.small{font-size:10px;}
.fill.tiny{font-size:9px;}
.checkmark{font-size:18px;font-weight:900;color:#111;}
.loading,.error{padding:40px 18px;text-align:center;font-weight:800;color:rgba(255,255,255,.8);}
.error{display:none;color:#fff;}
@media print{
  @page{size:A4 landscape;margin:0;}
  body{background:#fff;}
  .preview-bar{display:none;}
  .preview-body{padding:0;overflow:visible;}
  .pdf-page{width:297mm;height:210mm;margin:0;box-shadow:none;page-break-after:always;}
  .pdf-page:last-child{page-break-after:auto;}
}
@media (max-width:720px){
  .preview-bar{align-items:flex-start;flex-direction:column;}
  .preview-actions{width:100%;justify-content:space-between;}
  .preview-actions button,.preview-actions a{flex:1;padding:0 8px;}
  .preview-body{padding:10px;}
}
</style>
</head>
<body>
<div class="preview-shell">
  <header class="preview-bar">
    <div class="preview-title">
      <strong id="title">36協定 正式様式プレビュー</strong>
      <span id="subtitle">添付PDF様式に入力内容を重ねて表示します</span>
    </div>
    <div class="preview-actions">
      <button onclick="goPreviewBack()"><i class="ti ti-arrow-left"></i>戻る</button>
      <button class="print-btn" onclick="window.print()"><i class="ti ti-printer"></i>印刷・PDF保存</button>
      <a id="template-link" href="#" target="_blank" rel="noopener"><i class="ti ti-file-type-pdf"></i>様式PDF</a>
    </div>
  </header>
  <main class="preview-body" id="pages">
    <div class="loading" id="loading">正式様式を読み込んでいます...</div>
    <div class="error" id="error">プレビューを表示できませんでした。36協定ページから再度開いてください。</div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const raw = sessionStorage.getItem('rodo36FormData');
const data = raw ? JSON.parse(raw) : null;
const templates = {
  general:'assets/pdfs/forms/rodo36-general.pdf',
  special:'assets/pdfs/forms/rodo36-special.pdf'
};
const pageW = 841.92;
const pageH = 595.32;
const pagesEl = document.getElementById('pages');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');

function goPreviewBack(){
  if(window.opener){ window.opener.focus(); window.close(); return; }
  if(history.length > 1){ history.back(); return; }
  location.href = 'rodo36.html';
}

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

function p(value, total){
  return `${(value / total * 100).toFixed(3)}%`;
}

function addFill(page, item){
  const el = document.createElement('div');
  el.className = `fill ${item.className || ''}`;
  el.style.left = p(item.x, pageW);
  el.style.top = p(item.y, pageH);
  el.style.width = p(item.w || 80, pageW);
  el.style.height = p(item.h || 18, pageH);
  el.innerHTML = esc(item.text);
  page.appendChild(el);
}

function basePageOne(){
  return [
    {x:94,y:82,w:185,text:data.jigyoshu},
    {x:300,y:82,w:205,text:data.jigyomei},
    {x:432,y:86,w:285,h:34,text:data.jusho,className:'small'},
    {x:740,y:83,w:82,text:data.yuko,className:'small'},
    {x:92,y:224,w:220,h:50,text:data.jiyu,className:'small'},
    {x:318,y:226,w:68,text:data.gyomu,className:'small'},
    {x:392,y:226,w:38,text:data.ninzu,className:'small'},
    {x:438,y:226,w:40,text:data.shotei,className:'small'},
    {x:488,y:226,w:48,text:data.nichi,className:'small'},
    {x:600,y:226,w:48,text:data.tsuki,className:'small'},
    {x:714,y:226,w:50,text:data.nen,className:'small'},
    {x:718,y:190,w:82,text:data.kisan || '',className:'tiny'},
    {x:92,y:360,w:220,h:42,text:data.kyujitsuJiyu,className:'small'},
    {x:318,y:362,w:68,text:data.kyujitsuGyomu,className:'small'},
    {x:392,y:362,w:38,text:data.ninzu,className:'small'},
    {x:500,y:362,w:72,text:'週1日',className:'small'},
    {x:610,y:362,w:58,text:data.kyujitsuBi,className:'small'},
    {x:774,y:396,w:18,text:'✓',className:'checkmark'},
    {x:148,y:430,w:110,text:data.teiketsu,className:'tiny'},
    {x:472,y:444,w:115,text:data.daihyoShoku || '',className:'tiny'},
    {x:472,y:456,w:130,text:data.daihyoName,className:'tiny'},
    {x:252,y:470,w:220,text:data.daihyoMethod,className:'tiny'},
    {x:347,y:513,w:18,text:'✓',className:'checkmark'},
    {x:792,y:477,w:18,text:'✓',className:'checkmark'},
    {x:132,y:529,w:110,text:data.todoke,className:'tiny'},
    {x:472,y:541,w:115,text:data.shiyoShoku,className:'tiny'},
    {x:472,y:552,w:130,text:data.shiyoName,className:'tiny'},
    {x:248,y:570,w:250,text:data.roukisho,className:'tiny'}
  ];
}

function specialPageThree(){
  return [
    {x:28,y:181,w:205,h:78,text:data.tokuJiyu,className:'small'},
    {x:242,y:181,w:58,text:data.gyomu,className:'small'},
    {x:302,y:181,w:36,text:data.ninzu,className:'small'},
    {x:348,y:181,w:54,text:data.nichi,className:'small'},
    {x:462,y:181,w:52,text:data.tokuKaisu,className:'small'},
    {x:520,y:181,w:54,text:data.tokuTsuki,className:'small'},
    {x:678,y:181,w:56,text:data.tokuNen,className:'small'},
    {x:72,y:371,w:170,text:'9',className:'small'},
    {x:300,y:371,w:440,h:32,text:data.fukushi,className:'small'},
    {x:774,y:405,w:18,text:'✓',className:'checkmark'},
    {x:140,y:438,w:110,text:data.teiketsu,className:'tiny'},
    {x:462,y:448,w:115,text:data.daihyoShoku || '',className:'tiny'},
    {x:462,y:459,w:130,text:data.daihyoName,className:'tiny'},
    {x:245,y:470,w:220,text:data.daihyoMethod,className:'tiny'},
    {x:132,y:529,w:110,text:data.todoke,className:'tiny'},
    {x:462,y:541,w:115,text:data.shiyoShoku,className:'tiny'},
    {x:462,y:552,w:130,text:data.shiyoName,className:'tiny'},
    {x:248,y:570,w:250,text:data.roukisho,className:'tiny'}
  ];
}

function overlaysFor(pageNo){
  if(pageNo === 1) return basePageOne();
  if(data.type === 'special' && pageNo === 3) return specialPageThree();
  return [];
}

async function render(){
  if(!data || !window.pdfjsLib){
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    return;
  }
  const template = templates[data.type] || templates.general;
  document.getElementById('title').textContent = data.type === 'special' ? '36協定届 正式様式（特別条項付き）' : '36協定届 正式様式';
  document.getElementById('subtitle').textContent = `${data.jigyomei || '未入力'} / 印刷時はA4横で出力されます`;
  document.getElementById('template-link').href = template;
  const pdf = await pdfjsLib.getDocument(template).promise;
  pagesEl.innerHTML = '';
  for(let i = 1; i <= pdf.numPages; i++){
    const pageBox = document.createElement('section');
    pageBox.className = 'pdf-page';
    const canvas = document.createElement('canvas');
    pageBox.appendChild(canvas);
    pagesEl.appendChild(pageBox);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale:2});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({canvasContext:canvas.getContext('2d'), viewport}).promise;
    overlaysFor(i).forEach(item => addFill(pageBox, item));
  }
}

render().catch(err => {
  console.error(err);
  loadingEl.style.display = 'none';
  errorEl.style.display = 'block';
});
</script>
</body>
</html>
