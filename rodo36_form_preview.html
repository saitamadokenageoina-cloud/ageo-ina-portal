<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>36協定 正式様式プレビュー</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
body{background:#0f1720;color:#fff;margin:0;}
.preview-shell{min-height:100vh;display:flex;flex-direction:column;}
.preview-bar{
  position:sticky;top:0;z-index:20;background:#1B2A3B;border-bottom:1px solid rgba(255,255,255,.12);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.preview-title{min-width:0;}
.preview-title strong{display:block;font-size:15px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.preview-title span{display:block;font-size:11px;color:rgba(255,255,255,.58);}
.preview-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.preview-actions button,.preview-actions a{
  border:none;border-radius:8px;background:rgba(255,255,255,.1);color:#fff;
  min-height:38px;padding:0 12px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:13px;font-weight:800;
}
.preview-actions .print-btn{background:#E8612A;}
.preview-body{padding:18px;overflow:auto;}
.pdf-page{
  width:min(100%,1123px);aspect-ratio:841.92/595.32;margin:0 auto 18px;position:relative;background:#fff;
  box-shadow:0 18px 50px rgba(0,0,0,.42);overflow:hidden;
}
.pdf-page canvas{width:100%;height:100%;display:block;}
.fill{
  position:absolute;color:#111;font-weight:600;line-height:1.14;white-space:pre-wrap;overflow:hidden;
  font-family:"Yu Gothic UI","Meiryo","Hiragino Sans",sans-serif;font-size:7.1px;
  letter-spacing:-.01em;text-align:center;display:flex;align-items:center;justify-content:center;
}
.fill.small{font-size:6.3px;}
.fill.tiny{font-size:5.6px;}
.fill.left{text-align:left;justify-content:flex-start;}
.fill.top{align-items:flex-start;}
.checkmark{font-size:10px;font-weight:900;color:#111;line-height:1;}
.loading,.error{padding:40px 18px;text-align:center;font-weight:800;color:rgba(255,255,255,.8);}
.error{display:none;color:#fff;}
@media print{
  @page{size:A4 landscape;margin:0;}
  body{background:#fff;}
  .preview-bar{display:none;}
  .preview-body{padding:0;overflow:visible;}
  .pdf-page{width:297mm;height:210mm;margin:0;box-shadow:none;page-break-after:always;}
  .pdf-page:last-child{page-break-after:auto;}
}
@media (max-width:720px){
  .preview-bar{align-items:flex-start;flex-direction:column;}
  .preview-actions{width:100%;justify-content:space-between;}
  .preview-actions button,.preview-actions a{flex:1;padding:0 8px;}
  .preview-body{padding:10px;}
}
</style>
</head>
<body>
<div class="preview-shell">
  <header class="preview-bar">
    <div class="preview-title">
      <strong id="title">36協定 正式様式プレビュー</strong>
      <span id="subtitle">添付PDF様式に入力内容を重ねて表示します</span>
    </div>
    <div class="preview-actions">
      <button onclick="goPreviewBack()"><i class="ti ti-arrow-left"></i>戻る</button>
      <button class="print-btn" onclick="window.print()"><i class="ti ti-printer"></i>印刷・PDF保存</button>
      <a id="template-link" href="#" target="_blank" rel="noopener"><i class="ti ti-file-type-pdf"></i>様式PDF</a>
    </div>
  </header>
  <main class="preview-body" id="pages">
    <div class="loading" id="loading">正式様式を読み込んでいます...</div>
    <div class="error" id="error">プレビューを表示できませんでした。36協定ページから再度開いてください。</div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const raw = sessionStorage.getItem('rodo36FormData');
const data = raw ? JSON.parse(raw) : null;
const params = new URLSearchParams(location.search);
const templates = {
  general:'assets/pdfs/forms/rodo36-general.pdf',
  special:'assets/pdfs/forms/rodo36-special.pdf'
};
const pageW = 841.92;
const pageH = 595.32;
const pagesEl = document.getElementById('pages');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');

function goPreviewBack(){
  if(window.opener){ window.opener.focus(); window.close(); return; }
  if(history.length > 1){ history.back(); return; }
  location.href = 'rodo36.html';
}

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

function p(value, total){
  return `${(value / total * 100).toFixed(3)}%`;
}

function addFill(page, item){
  const el = document.createElement('div');
  el.className = `fill ${item.className || ''}`;
  el.style.left = p(item.x, pageW);
  el.style.top = p(item.y, pageH);
  el.style.width = p(item.w || 80, pageW);
  el.style.height = p(item.h || 18, pageH);
  if(item.fontSize) el.style.fontSize = `${item.fontSize}px`;
  el.innerHTML = esc(item.text);
  page.appendChild(el);
  fitFill(el);
}

function fitFill(el){
  let size = parseFloat(getComputedStyle(el).fontSize);
  const min = 4.4;
  for(let i = 0; i < 12 && size > min; i++){
    if(el.scrollWidth <= el.clientWidth + 1 && el.scrollHeight <= el.clientHeight + 1) break;
    size -= .35;
    el.style.fontSize = `${size}px`;
  }
}

function basePageOne(){
  return [
    {x:96,y:80,w:184,h:18,text:data.jigyoshu,fontSize:6.7},
    {x:304,y:80,w:196,h:18,text:data.jigyomei,fontSize:6.7},
    {x:435,y:85,w:280,h:30,text:data.jusho,className:'small'},
    {x:742,y:82,w:78,h:18,text:data.yuko,className:'small'},
    {x:95,y:222,w:214,h:47,text:data.jiyu,className:'small top left'},
    {x:319,y:224,w:66,h:30,text:data.gyomu,className:'small'},
    {x:394,y:224,w:34,h:18,text:data.ninzu,className:'small'},
    {x:440,y:224,w:36,h:18,text:data.shotei,className:'small'},
    {x:493,y:222,w:36,h:17,text:data.nichi,className:'small',fontSize:5.8},
    {x:604,y:222,w:38,h:17,text:data.tsuki,className:'small',fontSize:5.8},
    {x:718,y:222,w:40,h:17,text:data.nen,className:'small',fontSize:5.8},
    {x:719,y:187,w:78,h:18,text:data.kisan || '',className:'tiny'},
    {x:95,y:359,w:214,h:39,text:data.kyujitsuJiyu,className:'small top left'},
    {x:319,y:360,w:66,h:26,text:data.kyujitsuGyomu,className:'small'},
    {x:394,y:360,w:34,h:18,text:data.ninzu,className:'small'},
    {x:500,y:360,w:68,h:18,text:'週1日',className:'small'},
    {x:610,y:360,w:54,h:18,text:data.kyujitsuBi,className:'small'},
    {x:776,y:396,w:12,h:12,text:'✓',className:'checkmark'},
    {x:151,y:429,w:94,h:12,text:data.teiketsu,className:'tiny',fontSize:5.0},
    {x:474,y:441,w:106,h:13,text:data.daihyoShoku || '',className:'tiny'},
    {x:474,y:454,w:122,h:14,text:data.daihyoName,className:'tiny'},
    {x:254,y:469,w:210,h:14,text:data.daihyoMethod,className:'tiny'},
    {x:349,y:513,w:12,h:12,text:'✓',className:'checkmark'},
    {x:794,y:477,w:12,h:12,text:'✓',className:'checkmark'},
    {x:135,y:529,w:94,h:12,text:data.todoke,className:'tiny',fontSize:5.0},
    {x:474,y:539,w:106,h:13,text:data.shiyoShoku,className:'tiny'},
    {x:474,y:550,w:122,h:14,text:data.shiyoName,className:'tiny'},
    {x:250,y:569,w:238,h:14,text:data.roukisho,className:'tiny'}
  ];
}

function specialPageThree(){
  return [
    {x:30,y:179,w:198,h:74,text:data.tokuJiyu,className:'small top left'},
    {x:244,y:179,w:54,h:26,text:data.gyomu,className:'small'},
    {x:304,y:179,w:32,h:18,text:data.ninzu,className:'small'},
    {x:353,y:177,w:42,h:17,text:data.nichi,className:'small',fontSize:5.8},
    {x:466,y:177,w:42,h:17,text:data.tokuKaisu,className:'small',fontSize:5.8},
    {x:525,y:177,w:44,h:17,text:data.tokuTsuki,className:'small',fontSize:5.8},
    {x:682,y:177,w:46,h:17,text:data.tokuNen,className:'small',fontSize:5.8},
    {x:74,y:370,w:162,h:16,text:'9',className:'small'},
    {x:302,y:370,w:430,h:30,text:data.fukushi,className:'small left'},
    {x:776,y:405,w:12,h:12,text:'✓',className:'checkmark'},
    {x:143,y:438,w:94,h:12,text:data.teiketsu,className:'tiny',fontSize:5.0},
    {x:464,y:446,w:106,h:13,text:data.daihyoShoku || '',className:'tiny'},
    {x:464,y:457,w:122,h:14,text:data.daihyoName,className:'tiny'},
    {x:247,y:469,w:210,h:14,text:data.daihyoMethod,className:'tiny'},
    {x:135,y:529,w:94,h:12,text:data.todoke,className:'tiny',fontSize:5.0},
    {x:464,y:539,w:106,h:13,text:data.shiyoShoku,className:'tiny'},
    {x:464,y:550,w:122,h:14,text:data.shiyoName,className:'tiny'},
    {x:250,y:569,w:238,h:14,text:data.roukisho,className:'tiny'}
  ];
}

function overlaysFor(pageNo){
  if(pageNo === 1) return basePageOne();
  if(data.type === 'special' && pageNo === 3) return specialPageThree();
  return [];
}

async function render(){
  if(!data || !window.pdfjsLib){
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    return;
  }
  const template = templates[data.type] || templates.general;
  document.getElementById('title').textContent = data.type === 'special' ? '36協定届 正式様式（特別条項付き）' : '36協定届 正式様式';
  document.getElementById('subtitle').textContent = `${data.jigyomei || '未入力'} / 印刷時はA4横で出力されます`;
  document.getElementById('template-link').href = template;
  const pdf = await pdfjsLib.getDocument(template).promise;
  pagesEl.innerHTML = '';
  const printPages = data.type === 'special' ? [1,3] : [1];
  for(const i of printPages){
    const pageBox = document.createElement('section');
    pageBox.className = 'pdf-page';
    const canvas = document.createElement('canvas');
    pageBox.appendChild(canvas);
    pagesEl.appendChild(pageBox);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale:2});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({canvasContext:canvas.getContext('2d'), viewport}).promise;
    overlaysFor(i).forEach(item => addFill(pageBox, item));
  }
  if(params.get('print') === '1') setTimeout(() => window.print(), 500);
}

render().catch(err => {
  console.error(err);
  loadingEl.style.display = 'none';
  errorEl.style.display = 'block';
});
</script>
</body>
</html>
