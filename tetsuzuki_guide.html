let currentMode = "tetsuzuki";

function setMode(mode){
  currentMode = mode;
  document.getElementById('panel-tetsuzuki').style.display = mode === 'tetsuzuki' ? 'block' : 'none';
  document.getElementById('panel-merit').style.display = mode === 'merit' ? 'block' : 'none';
  const tBtn = document.getElementById('mode-tetsuzuki');
  const mBtn = document.getElementById('mode-merit');
  if(mode === 'tetsuzuki'){
    tBtn.classList.add('active'); mBtn.classList.remove('active');
  } else {
    mBtn.classList.add('active'); tBtn.classList.remove('active');
  }
}

function renderMerits(){
  const el = document.getElementById('merit-list');
  el.innerHTML = '';
  const cats = [...new Set(MERITS.map(m => m.cat))];
  cats.forEach(cat=>{
    const catHeader = document.createElement('p');
    catHeader.style.fontSize = '12px';
    catHeader.style.fontWeight = '500';
    catHeader.style.color = 'var(--color-text-secondary)';
    catHeader.style.margin = '14px 0 6px';
    catHeader.textContent = cat;
    el.appendChild(catHeader);

    MERITS.filter(m => m.cat === cat).forEach(m=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.style.padding = '0.85rem 1.1rem';
      card.style.marginBottom = '10px';
      card.innerHTML = `
        <div style="display:flex; align-items:flex-start; gap:10px;">
          <div class="icon-circle" style="width:32px; height:32px; background:${m.bg}; color:${m.fg};">
            <i class="ti ${m.icon}" style="font-size:16px;" aria-hidden="true"></i>
          </div>
          <div>
            <p style="font-size:14px; font-weight:500; margin:0 0 4px;">${m.title}</p>
            <p style="font-size:13px; color:var(--color-text-secondary); margin:0;">${m.desc}</p>
          </div>
        </div>
      `;
      el.appendChild(card);
    });
  });
}

const TAGS = ["すべて","加入","家族異動","住所・氏名","脱退","再交付","労働保険","国保給付","共済金"];
let activeTag = "すべて";

function renderFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  TAGS.forEach(tag=>{
    const btn = document.createElement('button');
    btn.textContent = tag;
    if(tag === activeTag) btn.classList.add('active');
    btn.onclick = () => { activeTag = tag; renderFilters(); renderList(); };
    el.appendChild(btn);
  });
}

function renderList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('list');
  list.innerHTML = '';

  const filtered = ITEMS.filter(item=>{
    const tagMatch = activeTag === 'すべて' || item.tag === activeTag;
    const text = (item.title + item.docs.join(' ') + item.tag).toLowerCase();
    const qMatch = q === '' || text.includes(q);
    return tagMatch && qMatch;
  });

  if(filtered.length === 0){
    list.innerHTML = '<p class="empty">該当する項目が見つかりませんでした</p>';
    return;
  }

  filtered.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';

    const docsHtml = item.docs.map(d => '<li>' + d + '</li>').join('');
    const badgeClass = item.confirmed ? 'ok' : 'warn';
    const badgeText = item.confirmed ? '確認済み' : '要確認';
    const noteHtml = item.note ? `<p class="note"><i class="ti ti-info-circle" aria-hidden="true"></i>${item.note}</p>` : '';

    card.innerHTML = `
      <div class="card-head">
        <div class="card-head-left">
          <div class="icon-circle" style="background:${item.bg}; color:${item.fg};">
            <i class="ti ${item.icon}" aria-hidden="true"></i>
          </div>
          <p class="card-title">${item.title}</p>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="card-body">
        <p class="label">必要書類</p>
        <ul class="docs">${docsHtml}</ul>
        <div class="meta-row">
          <div>
            <p class="label">提出先</p>
            <p>${item.where}</p>
          </div>
          <div>
            <p class="label">期限</p>
            <p>${item.deadline}</p>
          </div>
        </div>
        ${noteHtml}
      </div>
    `;
    list.appendChild(card);
  });
}

document.getElementById('search').addEventListener('input', renderList);
renderFilters();
renderList();
renderMerits();
setMode('tetsuzuki');
</script>
