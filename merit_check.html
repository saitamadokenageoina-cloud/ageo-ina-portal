<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>加入メリット診断｜埼玉土建 上尾伊奈支部</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
.diag-hero{background:linear-gradient(135deg,#7B1F4A,#C0392B);border-radius:var(--r16);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.diag-hero i{font-size:44px;color:#FFAABB;flex-shrink:0;}
.diag-hero h2{font-size:18px;font-weight:800;color:#fff;margin:0 0 4px;}
.diag-hero p{font-size:13px;color:rgba(255,255,255,.65);margin:0;}
/* 質問 */
.diag-step{background:var(--white);border-radius:var(--r16);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:12px;display:none;}
.diag-step.active{display:block;}
.diag-step-num{font-size:11px;font-weight:700;color:#C0392B;letter-spacing:.1em;margin:0 0 6px;}
.diag-q{font-size:17px;font-weight:800;color:var(--navy);margin:0 0 14px;line-height:1.45;}
.diag-choice{width:100%;padding:13px 16px;border-radius:var(--r12);border:2px solid var(--gray200);background:var(--white);color:var(--navy);font-size:15px;font-weight:600;text-align:left;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;}
.diag-choice:hover,.diag-choice.selected{border-color:#C0392B;background:#FEF0ED;color:#9B1A1A;}
.diag-choice i{font-size:20px;color:#C0392B;flex-shrink:0;}
/* 結果 */
.result-hero{background:linear-gradient(135deg,#1B2A3B,#0D3A6B);border-radius:var(--r16);padding:20px;margin-bottom:14px;text-align:center;}
.result-hero-emoji{font-size:52px;display:block;margin-bottom:8px;}
.result-hero-title{font-size:20px;font-weight:800;color:#fff;margin:0 0 4px;}
.result-hero-sub{font-size:14px;color:rgba(255,255,255,.65);margin:0;}
.merit-result-card{background:var(--white);border-radius:var(--r16);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;}
.merit-result-icon{width:48px;height:48px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.merit-result-icon i{font-size:24px;}
.merit-result-rank{font-size:11px;font-weight:700;letter-spacing:.06em;margin:0 0 3px;}
.merit-result-title{font-size:15px;font-weight:800;color:var(--navy);margin:0 0 4px;}
.merit-result-desc{font-size:13px;color:var(--gray600);margin:0;line-height:1.65;}
.merit-result-amount{font-size:13px;font-weight:700;color:var(--orange);background:var(--orange-lt);border-radius:6px;padding:3px 10px;display:inline-block;margin-top:5px;}
.rank1{border-left:4px solid var(--orange);}
.rank2{border-left:4px solid var(--blue);}
.rank3{border-left:4px solid var(--green);}
</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <button class="hdr-back" onclick="location.href='index.html'"><i class="ti ti-arrow-left"></i>ホーム</button>
  <div style="text-align:right;">
    <p class="hdr-org" style="margin:0;">埼玉土建 上尾伊奈支部</p>
    <p class="hdr-title" style="margin:0;font-size:14px;">加入メリット診断</p>
  </div>
</header>
<div class="content">
  <div class="diag-hero">
    <i class="ti ti-sparkles"></i>
    <div>
      <h2>加入メリット診断</h2>
      <p>あなたに最もメリットになる制度を診断します</p>
    </div>
  </div>

  <!-- Q1：就業形態 -->
  <div class="diag-step active" id="dq1">
    <p class="diag-step-num">QUESTION 1 / 5</p>
    <p class="diag-q">あなたの就業形態は？</p>
    <button class="diag-choice" onclick="setAns('type','hitori');goNext('dq2')"><i class="ti ti-hammer"></i>一人親方・個人事業主</button>
    <button class="diag-choice" onclick="setAns('type','shain');goNext('dq2')"><i class="ti ti-users"></i>会社員・現場作業員</button>
    <button class="diag-choice" onclick="setAns('type','jigyou');goNext('dq2')"><i class="ti ti-building"></i>事業主（従業員を雇用）</button>
  </div>

  <!-- Q2：年齢 -->
  <div class="diag-step" id="dq2">
    <p class="diag-step-num">QUESTION 2 / 5</p>
    <p class="diag-q">年齢は？</p>
    <button class="diag-choice" onclick="setAns('age','u30');goNext('dq3')"><i class="ti ti-user"></i>29歳以下</button>
    <button class="diag-choice" onclick="setAns('age','30to49');goNext('dq3')"><i class="ti ti-user"></i>30〜49歳</button>
    <button class="diag-choice" onclick="setAns('age','50to59');goNext('dq3')"><i class="ti ti-user"></i>50〜59歳</button>
    <button class="diag-choice" onclick="setAns('age','60plus');goNext('dq3')"><i class="ti ti-user"></i>60歳以上</button>
  </div>

  <!-- Q3：家族 -->
  <div class="diag-step" id="dq3">
    <p class="diag-step-num">QUESTION 3 / 5</p>
    <p class="diag-q">家族構成は？</p>
    <button class="diag-choice" onclick="setAns('family','hitori');goNext('dq4')"><i class="ti ti-user-circle"></i>独身・単身</button>
    <button class="diag-choice" onclick="setAns('family','fufu');goNext('dq4')"><i class="ti ti-heart"></i>夫婦のみ</button>
    <button class="diag-choice" onclick="setAns('family','kodomo');goNext('dq4')"><i class="ti ti-baby-carriage"></i>子どもがいる</button>
    <button class="diag-choice" onclick="setAns('family','oyako');goNext('dq4')"><i class="ti ti-users"></i>子ども＋親など大家族</button>
  </div>

  <!-- Q4：健康保険 -->
  <div class="diag-step" id="dq4">
    <p class="diag-step-num">QUESTION 4 / 5</p>
    <p class="diag-q">現在の健康保険は？</p>
    <button class="diag-choice" onclick="setAns('hoken','kokuho');goNext('dq5')"><i class="ti ti-building-community"></i>市区町村の国民健康保険</button>
    <button class="diag-choice" onclick="setAns('hoken','shakai');goNext('dq5')"><i class="ti ti-briefcase"></i>会社の社会保険（協会けんぽ等）</button>
    <button class="diag-choice" onclick="setAns('hoken','doken');goNext('dq5')"><i class="ti ti-heart-plus"></i>すでに土建国保に加入</button>
    <button class="diag-choice" onclick="setAns('hoken','nashi');goNext('dq5')"><i class="ti ti-x"></i>未加入・わからない</button>
  </div>

  <!-- Q5：関心 -->
  <div class="diag-step" id="dq5">
    <p class="diag-step-num">QUESTION 5 / 5</p>
    <p class="diag-q">今一番気になることは？（複数ある場合は最も重要なもの）</p>
    <button class="diag-choice" onclick="setAns('concern','medical');showResult()"><i class="ti ti-stethoscope"></i>病気・ケガのときの保障</button>
    <button class="diag-choice" onclick="setAns('concern','rousai');showResult()"><i class="ti ti-helmet"></i>現場での労働災害・労災保険</button>
    <button class="diag-choice" onclick="setAns('concern','shotoku');showResult()"><i class="ti ti-cash"></i>収入が途絶えたときの補償</button>
    <button class="diag-choice" onclick="setAns('concern','shikaku');showResult()"><i class="ti ti-certificate"></i>資格取得・スキルアップ</button>
    <button class="diag-choice" onclick="setAns('concern','life');showResult()"><i class="ti ti-star"></i>生活優待・お得なサービス</button>
    <button class="diag-choice" onclick="setAns('concern','sougou');showResult()"><i class="ti ti-list-check"></i>全体的に知りたい</button>
  </div>

  <!-- 結果 -->
  <div class="diag-step" id="dresult">
    <div id="result-content"></div>
    <button class="btn-secondary" onclick="resetDiag()" style="display:flex;margin-top:4px;"><i class="ti ti-refresh"></i>もう一度診断する</button>
    <a href="tel:048-773-9863" class="btn-primary" style="display:flex;margin-top:8px;"><i class="ti ti-phone"></i>詳しく相談する（048-773-9863）</a>
  </div>
</div>
<footer>埼玉土建一般労働組合 上尾伊奈支部｜TEL 048-773-9863</footer>
</div>
<script>
let answers = {};

function setAns(k,v){ answers[k]=v; }
function goNext(id){
  document.querySelectorAll('.diag-step').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetDiag(){
  answers = {};
  document.querySelectorAll('.diag-step').forEach(s=>s.classList.remove('active'));
  document.getElementById('dq1').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// 診断ロジック：回答に応じてメリットスコアを計算
function showResult(){
  const {type, age, family, hoken, concern} = answers;

  // メリット候補リスト（各シナリオでスコアリング）
  const merits = [
    {
      id:'rousai', icon:'ti-helmet', bg:'#E8F5EE', fg:'#1A7A4A',
      title:'一人親方労災保険（特別加入）',
      desc:'現場でのケガ・事故の際、治療費全額無料＋休業補償（給付基礎日額の80%）が受け取れます。元請から加入を求められるケースも増えており、今すぐ加入を検討してください。',
      amount:'保険料：年額 約数万円〜（給付基礎日額による）',
      score: (type==='hitori'?50:0) + (concern==='rousai'?40:0) + (concern==='shotoku'?20:0)
    },
    {
      id:'kokuho', icon:'ti-heart-plus', bg:'#EDE8FE', fg:'#4A1A9B',
      title:'土建国保への加入',
      desc:'市区町村の国保と比べ、傷病手当金（最大180日）・一部負担払戻金（医療費全額）・葬祭費7万円など独自給付が充実。家族が多いほどメリットが大きくなります。',
      amount:'傷病手当金：最大180日分 ／ 一部負担払戻金：全額',
      score: (hoken==='kokuho'?50:0) + (hoken==='nashi'?40:0) + (family==='kodomo'?20:0) + (family==='oyako'?30:0) + (concern==='medical'?40:0) + (concern==='shotoku'?20:0)
    },
    {
      id:'kyosai', icon:'ti-shield-heart', bg:'#FEF0ED', fg:'#9B3A1A',
      title:'総合共済（病気・ケガ・死亡保障）',
      desc:'月1,390円（組合費に含む）で入院1日5,000円・死亡100〜300万円・手術5〜40倍の共済金が受け取れます。子育て世代や家族を持つ方に特に重要な制度です。',
      amount:'入院：1日5,000円 ／ 死亡：最大300万円 ／ 出生祝金：2万円',
      score: (family==='kodomo'?30:0) + (family==='oyako'?30:0) + (age==='30to49'?20:0) + (concern==='medical'?30:0) + (concern==='shotoku'?20:0) + (age==='50to59'?10:0)
    },
    {
      id:'shikaku', icon:'ti-certificate', bg:'#FFF8E6', fg:'#7A5500',
      title:'資格取得祝金・技能講習',
      desc:'埼玉土建技術研修センターで受講した技能講習・特別教育の受講料が全額祝金として給付されます。玉掛け（16,700円）・フルハーネス（8,000円）など、現場で必須の資格取得に活用できます。',
      amount:'技能講習：受講料全額給付 ／ 作業主任者：半額',
      score: (concern==='shikaku'?60:0) + (age==='u30'?20:0) + (type==='shain'?15:0)
    },
    {
      id:'life', icon:'ti-credit-card', bg:'#EDE8FE', fg:'#6B21A8',
      title:'どけんカード・生活優待サービス',
      desc:'埼玉県内700店以上の登録店で優待が受けられるどけんカード、宿泊補助（1人3,000円）、自動車共済、弁護士・税理士等の無料相談など、くらしに役立つサービスが充実。',
      amount:'DOKENカード：県内700店以上で割引',
      score: (concern==='life'?50:0) + (concern==='sougou'?20:0) + (family==='kodomo'?10:0)
    },
    {
      id:'rodo', icon:'ti-shield-check', bg:'#E8F0FB', fg:'#1A5FA8',
      title:'労働保険事務組合への加入',
      desc:'埼玉土建は厚生労働大臣認可の労働保険事務組合です。労災・雇用保険の手続きを支部で一括対応。事業主の特別加入（一人親方労災）も含め、まとめて相談できます。',
      amount:'労災保険：医療費全額 ／ 休業補償：給付基礎日額の80%',
      score: (type==='jigyou'?40:0) + (concern==='rousai'?30:0) + (type==='hitori'?20:0)
    },
  ];

  // concern=sougouの場合は全体的にスコアアップ
  if(concern==='sougou'){
    merits.forEach(m=>m.score+=10);
  }

  // スコア順でソート
  merits.sort((a,b)=>b.score-a.score);
  const top3 = merits.slice(0,3);

  const rankLabel = ['⭐ 最もおすすめ','🔷 次におすすめ','🔶 あわせてチェック'];
  const rankClass = ['rank1','rank2','rank3'];

  // プロフィールサマリー
  const typeLabel = {hitori:'一人親方・個人事業主',shain:'会社員・現場作業員',jigyou:'事業主'}[type]||'';
  const ageLabel  = {u30:'29歳以下',30to49:'30〜49歳',50to59:'50〜59歳',60plus:'60歳以上'}[age]||'';
  const familyLabel = {hitori:'独身',fufu:'夫婦のみ',kodomo:'子どもあり',oyako:'大家族'}[family]||'';
  const hokenLabel = {kokuho:'市区町村国保',shakai:'社会保険',doken:'土建国保',nashi:'未加入'}[hoken]||'';

  let html = `
    <div class="result-hero">
      <span class="result-hero-emoji">🎯</span>
      <p class="result-hero-title">診断結果</p>
      <p class="result-hero-sub">${typeLabel}・${ageLabel}・${familyLabel}の場合</p>
    </div>
    <div style="background:var(--gray50);border-radius:var(--r12);padding:12px 16px;font-size:13px;color:var(--gray600);margin-bottom:14px;">
      <strong>入力内容：</strong>${typeLabel} ／ ${ageLabel} ／ ${familyLabel} ／ 健康保険：${hokenLabel}
    </div>`;

  top3.forEach((m,i)=>{
    html += `<div class="merit-result-card ${rankClass[i]}">
      <div class="merit-result-icon" style="background:${m.bg};"><i class="ti ${m.icon}" style="color:${m.fg};font-size:24px;"></i></div>
      <div>
        <p class="merit-result-rank" style="color:${i===0?'var(--orange)':i===1?'var(--blue)':'var(--green)'}">${rankLabel[i]}</p>
        <p class="merit-result-title">${m.title}</p>
        <p class="merit-result-desc">${m.desc}</p>
        <span class="merit-result-amount">💰 ${m.amount}</span>
      </div>
    </div>`;
  });

  html += `<div class="alert alert-info" style="margin-top:4px;">
    <i class="ti ti-info-circle"></i>
    <span>診断結果はあくまで参考です。詳しい制度内容や加入手続きは支部にお気軽にご相談ください。</span>
  </div>`;

  document.getElementById('result-content').innerHTML = html;
  goNext('dresult');
}
</script>
</body>
</html>
