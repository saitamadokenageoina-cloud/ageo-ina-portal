<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>加入メリット診断｜埼玉土建 上尾伊奈支部</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
.diag-hero{background:linear-gradient(135deg,#7B1F4A,#C0392B);border-radius:var(--r16);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.diag-hero i{font-size:44px;color:#FFAABB;flex-shrink:0;}
.diag-hero h2{font-size:18px;font-weight:800;color:#fff;margin:0 0 4px;}
.diag-hero p{font-size:13px;color:rgba(255,255,255,.65);margin:0;}

/* 進捗ドット */
.prog-dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px;}
.prog-dot{width:10px;height:10px;border-radius:50%;background:var(--gray200);transition:all .3s;}
.prog-dot.done{background:#C0392B;}
.prog-dot.current{background:#C0392B;transform:scale(1.4);}

/* 質問カード */
.q-card{background:var(--white);border-radius:var(--r16);box-shadow:var(--shadow-sm);padding:22px 20px;margin-bottom:12px;}
.q-num{font-size:11px;font-weight:700;color:#C0392B;letter-spacing:.12em;margin:0 0 8px;}
.q-text{font-size:18px;font-weight:800;color:var(--navy);margin:0 0 18px;line-height:1.45;}

/* 選択肢ボタン */
.q-choices{display:flex;flex-direction:column;gap:10px;}
.q-choice{
  display:flex !important;
  align-items:center !important;
  gap:12px !important;
  width:100% !important;
  padding:14px 16px !important;
  border-radius:var(--r12) !important;
  border:2px solid var(--gray200) !important;
  background:var(--white) !important;
  color:var(--navy) !important;
  font-size:15px !important;
  font-weight:600 !important;
  text-align:left !important;
  cursor:pointer !important;
  transition:all .15s !important;
  box-shadow:none !important;
  transform:none !important;
}
.q-choice:hover{
  border-color:#C0392B !important;
  background:#FEF0ED !important;
  color:#9B1A1A !important;
  transform:translateX(4px) !important;
}
.q-choice i{font-size:22px;color:#C0392B;flex-shrink:0;}

/* 結果 */
.r-hero{background:linear-gradient(135deg,#1B2A3B,#0D3A6B);border-radius:var(--r16);padding:22px;margin-bottom:14px;text-align:center;}
.r-emoji{font-size:56px;display:block;margin-bottom:10px;}
.r-title{font-size:22px;font-weight:800;color:#fff;margin:0 0 6px;}
.r-sub{font-size:13px;color:rgba(255,255,255,.65);margin:0;}
.r-profile{background:var(--gray50);border-radius:var(--r12);padding:12px 16px;font-size:13px;color:var(--gray600);margin-bottom:14px;line-height:1.7;}

.merit-card{background:var(--white);border-radius:var(--r16);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;}
.merit-card.rank1{border-left:5px solid var(--orange);}
.merit-card.rank2{border-left:5px solid var(--blue);}
.merit-card.rank3{border-left:5px solid var(--green);}
.merit-icon{width:48px;height:48px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.merit-icon i{font-size:24px;}
.merit-rank{font-size:11px;font-weight:700;margin:0 0 3px;letter-spacing:.06em;}
.merit-title{font-size:15px;font-weight:800;color:var(--navy);margin:0 0 5px;}
.merit-desc{font-size:13px;color:var(--gray600);margin:0;line-height:1.65;}
.merit-amount{font-size:13px;font-weight:700;color:var(--orange);background:var(--orange-lt);border-radius:6px;padding:3px 10px;display:inline-block;margin-top:6px;}
</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <button class="hdr-back" onclick="goBack()"><i class="ti ti-arrow-left"></i>戻る</button>
  <div style="text-align:right;">
    <p class="hdr-org" style="margin:0;">埼玉土建 上尾伊奈支部</p>
    <p class="hdr-title" style="margin:0;font-size:14px;">加入メリット診断</p>
  </div>
</header>

<div class="content">
  <div class="diag-hero">
    <div style="position:relative;width:70px;height:70px;flex-shrink:0;">
          <svg viewBox="0 0 70 70" width="70" height="70">
            <!-- ターゲット -->
            <circle cx="35" cy="35" r="24" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
            <circle cx="35" cy="35" r="16" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>
            <circle cx="35" cy="35" r="8" fill="rgba(255,255,255,.2)"/>
            <circle cx="35" cy="35" r="3" fill="rgba(255,200,0,.9)"/>
            <!-- 矢 -->
            <line x1="62" y1="8" x2="38" y2="33" stroke="rgba(255,255,255,.7)" stroke-width="2.5" stroke-linecap="round"/>
            <polygon points="62,8 55,10 60,15" fill="rgba(255,255,255,.7)"/>
            <!-- キラキラ -->
            <text x="8" y="18" font-size="12" fill="rgba(255,255,255,.5)">✨</text>
            <text x="52" y="62" font-size="10" fill="rgba(255,255,255,.4)">✨</text>
            <text x="6" y="56" font-size="8" fill="rgba(255,255,255,.35)">★</text>
          </svg>
        </div>
    <div>
      <h2>加入メリット診断</h2>
      <p>5つの質問に答えるだけ。あなたに最もお得な制度を診断します。</p>
    </div>
  </div>

  <!-- 進捗ドット -->
  <div class="prog-dots" id="prog-dots">
    <div class="prog-dot current" id="dot0"></div>
    <div class="prog-dot" id="dot1"></div>
    <div class="prog-dot" id="dot2"></div>
    <div class="prog-dot" id="dot3"></div>
    <div class="prog-dot" id="dot4"></div>
  </div>

  <!-- 質問エリア -->
  <div id="q-area"></div>

  <!-- 結果エリア（最初は非表示） -->
  <div id="result-area" style="display:none;"></div>
</div>
<footer>埼玉土建一般労働組合 上尾伊奈支部｜TEL 048-773-9863</footer>
</div>

<script>
// ===== 質問定義 =====
const QUESTIONS = [
  {
    key: 'type',
    text: 'あなたの就業形態は？',
    choices: [
      { val:'hitori', icon:'ti-hammer',    label:'一人親方・個人事業主' },
      { val:'shain',  icon:'ti-users',     label:'会社員・現場作業員' },
      { val:'jigyou', icon:'ti-building',  label:'事業主（従業員を雇用している）' },
    ]
  },
  {
    key: 'age',
    text: '年齢は？',
    choices: [
      { val:'u30',    icon:'ti-user', label:'29歳以下' },
      { val:'30to49', icon:'ti-user', label:'30〜49歳' },
      { val:'50to59', icon:'ti-user', label:'50〜59歳' },
      { val:'60plus', icon:'ti-user', label:'60歳以上' },
    ]
  },
  {
    key: 'family',
    text: '家族構成は？',
    choices: [
      { val:'hitori', icon:'ti-user-circle',   label:'独身・単身' },
      { val:'fufu',   icon:'ti-heart',          label:'夫婦のみ' },
      { val:'kodomo', icon:'ti-baby-carriage',  label:'子どもがいる' },
      { val:'oyako',  icon:'ti-users',          label:'子ども＋親など大家族' },
    ]
  },
  {
    key: 'hoken',
    text: '現在の健康保険は？',
    choices: [
      { val:'kokuho',  icon:'ti-building-community', label:'市区町村の国民健康保険' },
      { val:'shakai',  icon:'ti-briefcase',           label:'会社の社会保険（協会けんぽ等）' },
      { val:'doken',   icon:'ti-heart-plus',          label:'すでに土建国保に加入' },
      { val:'nashi',   icon:'ti-question-mark',       label:'未加入・わからない' },
    ]
  },
  {
    key: 'concern',
    text: '今一番気になることは？',
    choices: [
      { val:'medical',  icon:'ti-stethoscope',   label:'病気・ケガのときの保障' },
      { val:'rousai',   icon:'ti-helmet',         label:'現場での労働災害・労災保険' },
      { val:'shotoku',  icon:'ti-cash',           label:'収入が途絶えたときの補償' },
      { val:'shikaku',  icon:'ti-certificate',    label:'資格取得・スキルアップ' },
      { val:'life',     icon:'ti-star',           label:'生活優待・お得なサービス' },
      { val:'sougou',   icon:'ti-list-check',     label:'全体的に知りたい' },
    ]
  },
];

let answers = {};
let currentQ = 0;

// ===== 描画 =====
function renderQuestion(idx) {
  const q = QUESTIONS[idx];

  // choicesHtmlはdata属性でval・keyを渡す（onclick属性を使わない）
  const choicesHtml = q.choices.map((c, ci) => `
    <button class="q-choice" data-key="${q.key}" data-val="${c.val}" data-idx="${idx}" data-ci="${ci}">
      <i class="ti ${c.icon}"></i>${c.label}
    </button>`).join('');

  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <p class="q-num">QUESTION ${idx+1} / ${QUESTIONS.length}</p>
      <p class="q-text">${q.text}</p>
      <div class="q-choices">${choicesHtml}</div>
    </div>`;

  // イベントをaddEventListenerで設定
  document.querySelectorAll('.q-choice').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      const key = this.getAttribute('data-key');
      const val = this.getAttribute('data-val');
      const i   = parseInt(this.getAttribute('data-idx'));
      answer(key, val, i);
    });
  });

  // 進捗ドット更新
  for(let i=0;i<QUESTIONS.length;i++){
    const dot = document.getElementById('dot'+i);
    if(!dot) continue;
    dot.className = 'prog-dot' + (i<idx?' done':i===idx?' current':'');
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function answer(key, val, idx) {
  answers[key] = val;
  if(idx + 1 < QUESTIONS.length) {
    currentQ = idx + 1;
    renderQuestion(currentQ);
  } else {
    showResult();
  }
}

// ===== 診断ロジック =====
function showResult() {
  const {type, age, family, hoken, concern} = answers;

  const MERITS = [
    {
      id:'rousai', icon:'ti-helmet', bg:'#E8F5EE', fg:'#1A7A4A',
      title:'一人親方労災保険（特別加入）',
      desc:'現場でのケガ・事故の際、治療費全額無料＋休業補償（給付基礎日額の約80%）が受け取れます。元請から加入を求められるケースも急増しており、現場に入る前の加入を強くおすすめします。',
      amount:'保険料：給付基礎日額により異なる（年額数万円〜）',
      score: (type==='hitori'?50:0)+(concern==='rousai'?40:0)+(concern==='shotoku'?15:0)+(hoken==='nashi'?10:0)
    },
    {
      id:'kokuho', icon:'ti-heart-plus', bg:'#EDE8FE', fg:'#4A1A9B',
      title:'土建国保への加入',
      desc:'市区町村の国保にはない独自給付が充実。傷病手当金（最大180日・給付基礎日額の60%）、一部負担払戻金（医療費自己負担の全額払い戻し）、葬祭費7万円など。家族が多いほどお得です。',
      amount:'傷病手当金：最大180日分 ／ 医療費：自己負担を全額払い戻し',
      score: (hoken==='kokuho'?50:0)+(hoken==='nashi'?40:0)+(family==='kodomo'?25:0)+(family==='oyako'?35:0)+(concern==='medical'?40:0)+(concern==='shotoku'?20:0)
    },
    {
      id:'kyosai', icon:'ti-shield-heart', bg:'#FEF0ED', fg:'#9B3A1A',
      title:'総合共済（病気・ケガ・死亡保障）',
      desc:'月1,390円（組合費に含む）で入院1日5,000円・死亡最大300万円・手術5〜40倍の共済金が受け取れます。出生祝金2万円・結婚祝金3万円など祝金も充実。子育て世代や家族を持つ方に特に重要な制度です。',
      amount:'入院：1日5,000円 ／ 死亡：最大300万円 ／ 出生祝金：2万円',
      score: (family==='kodomo'?35:0)+(family==='oyako'?35:0)+(age==='30to49'?20:0)+(age==='50to59'?15:0)+(concern==='medical'?30:0)+(concern==='shotoku'?15:0)
    },
    {
      id:'shikaku', icon:'ti-certificate', bg:'#FFF8E6', fg:'#7A5500',
      title:'資格取得祝金・技能講習',
      desc:'埼玉土建技術研修センターで受講した技能講習・特別教育の受講料が全額祝金として給付されます。玉掛け（16,700円）・フルハーネス（8,000円）・足場特別教育（6,000円）など現場で必須の資格が実質無料に。',
      amount:'技能講習・特別教育：受講料全額給付 ／ 作業主任者：受講料半額',
      score: (concern==='shikaku'?60:0)+(age==='u30'?25:0)+(age==='30to49'?15:0)+(type==='shain'?15:0)+(type==='hitori'?10:0)
    },
    {
      id:'rodo', icon:'ti-shield-check', bg:'#E8F0FB', fg:'#1A5FA8',
      title:'労働保険事務組合への加入',
      desc:'埼玉土建は厚生労働大臣認可の労働保険事務組合です。労災・雇用保険の手続きを支部でまとめて対応。事業主の特別加入（一人親方労災）も含め、一か所で相談できます。',
      amount:'労災保険：医療費全額無料 ／ 休業補償：給付基礎日額の約80%',
      score: (type==='jigyou'?45:0)+(concern==='rousai'?30:0)+(type==='hitori'?20:0)+(hoken==='nashi'?10:0)
    },
    {
      id:'life', icon:'ti-credit-card', bg:'#EDE8FE', fg:'#6B21A8',
      title:'どけんカード・生活優待サービス',
      desc:'埼玉県内700店以上でお得に使えるどけんカード、宿泊補助（1人3,000円）、自動車共済（団体割引）、弁護士・税理士等の無料相談など、くらしに役立つサービスが組合費に含まれています。',
      amount:'DOKENカード：県内700店以上で割引 ／ 宿泊補助：1人3,000円',
      score: (concern==='life'?55:0)+(concern==='sougou'?20:0)+(family==='kodomo'?10:0)+(family==='oyako'?15:0)
    },
  ];

  // 「全体的に知りたい」は全体スコアアップ
  if(concern === 'sougou') MERITS.forEach(m=>m.score+=10);

  MERITS.sort((a,b)=>b.score-a.score);
  const top3 = MERITS.slice(0,3);

  const typeLabel   = {hitori:'一人親方・個人事業主', shain:'会社員・現場作業員', jigyou:'事業主'}[type]||'';
  const ageLabel    = {u30:'29歳以下', '30to49':'30〜49歳', '50to59':'50〜59歳', '60plus':'60歳以上'}[age]||'';
  const familyLabel = {hitori:'独身', fufu:'夫婦のみ', kodomo:'子どもあり', oyako:'大家族'}[family]||'';
  const hokenLabel  = {kokuho:'市区町村国保', shakai:'社会保険', doken:'土建国保加入済', nashi:'未加入'}[hoken]||'';

  const rankInfo = [
    { label:'⭐ 最もおすすめ', cls:'rank1', color:'var(--orange)' },
    { label:'🔷 次におすすめ', cls:'rank2', color:'var(--blue)' },
    { label:'🔶 あわせてチェック', cls:'rank3', color:'var(--green)' },
  ];

  let html = `
    <div class="r-hero">
      <span class="r-emoji">🎯</span>
      <p class="r-title">診断結果</p>
      <p class="r-sub">${typeLabel}・${ageLabel}・${familyLabel} の方の場合</p>
    </div>
    <div class="r-profile">
      <strong>📋 入力内容：</strong><br>
      就業形態：${typeLabel}<br>
      年齢：${ageLabel}　家族：${familyLabel}　健康保険：${hokenLabel}
    </div>
    ${top3.map((m,i)=>`
      <div class="merit-card ${rankInfo[i].cls}">
        <div class="merit-icon" style="background:${m.bg};"><i class="ti ${m.icon}" style="color:${m.fg};"></i></div>
        <div style="flex:1;">
          <p class="merit-rank" style="color:${rankInfo[i].color};">${rankInfo[i].label}</p>
          <p class="merit-title">${m.title}</p>
          <p class="merit-desc">${m.desc}</p>
          <span class="merit-amount">💰 ${m.amount}</span>
        </div>
      </div>`).join('')}
    <div class="alert alert-info" style="margin-top:4px;">
      <i class="ti ti-info-circle"></i>
      <span>診断結果はあくまで参考です。詳しい制度内容・加入手続きは支部へお気軽にご相談ください。</span>
    </div>
    <a href="tel:048-773-9863" class="btn-primary" style="display:flex;margin-bottom:8px;">
      <i class="ti ti-phone"></i>詳しく相談する（048-773-9863）
    </a>
    <button id="reset-btn" class="btn-secondary" style="display:flex;width:100%;">
      <i class="ti ti-refresh"></i>もう一度診断する
    </button>`;

  // 進捗ドットを全部完了に
  for(let i=0;i<QUESTIONS.length;i++){
    const dot = document.getElementById('dot'+i);
    if(dot) dot.className = 'prog-dot done';
  }

  document.getElementById('q-area').style.display = 'none';
  document.getElementById('result-area').innerHTML = html;
  document.getElementById('result-area').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});

  // リセットボタンのイベント
  const rb = document.getElementById('reset-btn');
  if(rb) rb.addEventListener('click', function(e){ e.preventDefault(); resetDiag(); });
}

function resetDiag() {
  answers = {};
  currentQ = 0;
  document.getElementById('q-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('result-area').innerHTML = '';
  renderQuestion(0);
}

// 初期表示
renderQuestion(0);
</script>
<script src="assets/js/navigation.js"></script>
</body>
</html>
